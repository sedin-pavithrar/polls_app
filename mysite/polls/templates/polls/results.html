{% load static %}

<link rel="stylesheet" href="{% static 'polls/style.css' %}">

<h1>{{ question.question_text }}</h1>

<ul>
    {% for choice in question.choice_set.all %}
        <li>
            {{ choice.choice_text }} -- {{ choice.votes }} vote{{ choice.votes|pluralize }}
        </li>
    {% endfor %}
</ul>

<button style = "margin-top : 30px;"><a href="{% url 'polls:detail' question.id %}">
    Vote again?
</a> </button>


<button style = "margin-left: 40px;"><a href="{% url 'polls:index' %}">
    Go to questions

</a></button>
